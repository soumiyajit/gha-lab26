name: Custom Action Security
on: [push]

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          # This caches your dependencies so the next run is faster!
          cache: 'npm'
          cache-dependency-path: '.github/actions/secret-scanner/package.json'

      - name: Install Scanner Dependencies
        run: npm install
        working-directory: .github/actions/secret-scanner

      - name: Run Secret Scanner Script
        # We call the script directly with node instead of letting GitHub wrap it
        run: node .github/actions/secret-scanner/index.js
        env:
          # GitHub Actions inputs are just environment variables prefixed with INPUT_
          INPUT_SEARCH_PATH: 'backend/src/config'